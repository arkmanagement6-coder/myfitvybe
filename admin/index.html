<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MyFitVybe</title>
    <link rel="stylesheet" href="/admin/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK Setup -->
    <script type="module" src="/admin/js/firebase-config.js"></script>
    <script type="module" src="/admin/js/auth.js"></script>
</head>
<body>
    <!-- Creative Background for Login -->
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-logo">MyFit<span>Vybe</span> Admin</div>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px;">
                Use your master credentials to login.<br>
                <small>ID: admin@myfitvybe.com | Pass: Ravi@123</small>
            </p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email / User ID</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@myfitvybe.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">Login to Dashboard</button>
                <div id="errorMessage" class="error-message"></div>
            </form>
        </div>
    </div>
</body>
</html>
